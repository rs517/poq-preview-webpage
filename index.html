<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartRC 2026-05-31 Preview</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --line: #d8dee6;
      --text: #111827;
      --muted: #667085;
      --green: #0f7a4c;
      --green-soft: #eaf6ef;
      --blue-soft: #eef4ff;
      --orange-soft: #fff7ed;
      --pink-soft: #fdf2f8;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
    }
    button, select { font: inherit; }
    .shell {
      margin: 0 auto;
      max-width: 920px;
      padding: 10px 12px 28px;
    }
    .stage-tabs {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-bottom: 8px;
    }
    .stage-tab, .race-pill, .nav-button {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #344054;
      min-height: 38px;
      padding: 8px 10px;
    }
    .stage-tab.active, .race-pill.active {
      background: #172033;
      border-color: #172033;
      color: #ffffff;
      font-weight: 700;
    }
    .race-scroll {
      display: flex;
      gap: 6px;
      margin: 0 -12px 10px;
      overflow-x: auto;
      padding: 0 12px 2px;
      scrollbar-width: none;
    }
    .race-scroll::-webkit-scrollbar { display: none; }
    .race-pill {
      flex: 0 0 auto;
      min-width: 48px;
    }
    .app-date {
      color: var(--muted);
      font-size: 12px;
      margin: 2px 0 7px;
    }
    .race-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
      margin: 0 0 10px;
    }
    .race-subtitle {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      margin-left: 4px;
    }
    .nav-row {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 10px;
    }
    .nav-button:disabled {
      color: #b7bec8;
      background: #f7f8fa;
    }
    .horse-details {
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 4px solid #9aa6b2;
      border-radius: 8px;
      margin: 0 0 10px;
      padding: 12px;
    }
    .horse-details.leader {
      background: #f7fbf8;
      border-left-color: var(--green);
    }
    .horse-details summary {
      cursor: pointer;
      list-style: none;
    }
    .horse-details summary::-webkit-details-marker { display: none; }
    .card-head {
      align-items: center;
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .rank-badge {
      align-items: center;
      background: #1f2937;
      border-radius: 999px;
      color: #ffffff;
      display: inline-flex;
      flex: 0 0 30px;
      font-size: 14px;
      font-weight: 700;
      height: 30px;
      justify-content: center;
      line-height: 1;
    }
    .horse-number-badge {
      align-items: center;
      border: 1px solid;
      border-radius: 6px;
      display: inline-flex;
      flex: 0 0 34px;
      font-size: 17px;
      font-weight: 800;
      height: 34px;
      justify-content: center;
      line-height: 1;
    }
    .horse-title { flex: 1 1 auto; min-width: 0; }
    .horse-name {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .horse-sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }
    .detail-pill {
      border: 1px solid #d1d5db;
      border-radius: 999px;
      color: #475467;
      flex: 0 0 auto;
      font-size: 12px;
      line-height: 1;
      padding: 6px 8px;
    }
    .main-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    .main-item {
      background: #f6f7f9;
      border-radius: 8px;
      min-width: 0;
      padding: 8px;
    }
    .main-item.primary { background: var(--green-soft); }
    .main-item.dash { background: var(--blue-soft); }
    .main-item.ten-pattern { background: var(--orange-soft); }
    .main-item.agari-pattern { background: var(--pink-soft); }
    .main-item span, .detail-item span {
      color: var(--muted);
      display: block;
      font-size: 11px;
      line-height: 1.2;
    }
    .main-item strong {
      color: var(--text);
      display: block;
      font-size: 18px;
      line-height: 1.25;
      margin-top: 3px;
      overflow-wrap: anywhere;
    }
    .pattern-badge {
      align-items: center;
      border: 1px solid #d0d5dd;
      border-radius: 999px;
      color: #475467;
      display: inline-flex;
      font-size: 16px;
      font-weight: 800;
      line-height: 1;
      margin-top: 6px;
      min-height: 28px;
      min-width: 44px;
      padding: 6px 10px;
    }
    .prediction-strip {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin: 0 0 8px;
    }
    .prediction-item {
      background: #f8fafc;
      border: 1px solid #d8dee6;
      border-radius: 8px;
      min-width: 0;
      padding: 8px;
    }
    .prediction-item span {
      color: var(--muted);
      display: block;
      font-size: 11px;
      line-height: 1.2;
    }
    .prediction-item strong {
      color: var(--text);
      display: block;
      font-size: 16px;
      line-height: 1.25;
      margin-top: 3px;
      overflow-wrap: anywhere;
    }
    .prediction-item.ai-rank.has-prediction strong {
      color: #172033;
      font-size: 18px;
      font-weight: 900;
    }
    .prediction-item.probability.level-low {
      background: #f8fafc;
    }
    .prediction-item.probability.level-normal {
      background: #edf6ff;
      border-color: #8ec5ff;
    }
    .prediction-item.probability.level-high {
      background: #d8f3e5;
      border-color: #4ab47a;
    }
    .prediction-item.probability.level-elite {
      background: #0f5f3d;
      border-color: #064e3b;
    }
    .prediction-item.probability.level-elite span,
    .prediction-item.probability.level-elite strong {
      color: #ffffff;
    }
    .prediction-item.level-empty {
      background: #f7f8fa;
      color: #98a2b3;
    }
    .pattern-badge.pattern-hot {
      background: #fff1e6;
      border-color: #fb923c;
      color: #9a3412;
      box-shadow: inset 0 0 0 1px rgba(251, 146, 60, 0.18);
    }
    .pattern-badge.pattern-normal {
      background: #ffffff;
      border-color: #cbd5e1;
      color: #334155;
    }
    .pattern-badge.pattern-empty {
      background: #f7f8fa;
      color: #98a2b3;
      font-weight: 700;
    }
    .bloodline-strip {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 8px;
    }
    .bloodline-box {
      background: #fbfcfd;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      min-width: 0;
      padding: 8px;
    }
    .bloodline-label {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }
    .bloodline-name {
      color: #344054;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.25;
      margin-top: 2px;
      min-height: 15px;
      overflow-wrap: anywhere;
    }
    .rate-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .rate-chip {
      border: 1px solid #d0d5dd;
      border-radius: 999px;
      color: #475467;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      min-height: 25px;
      padding: 6px 8px;
      white-space: nowrap;
    }
    .rate-chip.level-low {
      background: #f8fafc;
      color: #667085;
    }
    .rate-chip.level-normal {
      background: #eef8f1;
      border-color: #98d8ad;
      color: #0f5f3d;
    }
    .rate-chip.level-high {
      background: #cff2dd;
      border-color: #39a86c;
      color: #064e3b;
      font-weight: 800;
    }
    .rate-chip.level-elite {
      background: #065f46;
      border-color: #064e3b;
      color: #ffffff;
      font-weight: 800;
      box-shadow: inset 0 -2px 0 rgba(255, 255, 255, 0.18);
    }
    .rate-chip.level-empty {
      background: #f7f8fa;
      color: #98a2b3;
      font-weight: 700;
    }
    .detail-grid {
      border-top: 1px solid #e5e7eb;
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 10px;
      padding-top: 10px;
    }
    .detail-item strong {
      color: var(--text);
      display: block;
      font-size: 14px;
      line-height: 1.25;
      margin-top: 2px;
      overflow-wrap: anywhere;
    }
    @media (max-width: 640px) {
      .shell { padding: 8px 10px 24px; }
      .race-scroll { margin-left: -10px; margin-right: -10px; padding-left: 10px; padding-right: 10px; }
      .prediction-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .main-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .main-item { padding: 7px; }
      .main-item strong { font-size: 16px; }
      .horse-name { font-size: 16px; }
    }
  </style>
</head>

  <script>
    const data = JSON.parse(document.getElementById("smartRcData").textContent);
    const wakuColors = {
      "1": ["#ffffff", "#111827", "#d1d5db"],
      "2": ["#111827", "#ffffff", "#111827"],
      "3": ["#dc2626", "#ffffff", "#dc2626"],
      "4": ["#2563eb", "#ffffff", "#2563eb"],
      "5": ["#facc15", "#111827", "#eab308"],
      "6": ["#16a34a", "#ffffff", "#16a34a"],
      "7": ["#f97316", "#111827", "#ea580c"],
      "8": ["#f9a8d4", "#111827", "#f472b6"]
    };
    let stage = new URLSearchParams(location.search).get("stage") || data.defaultStage;
    let raceNumber = new URLSearchParams(location.search).get("race") || "01";
    let touchStartX = 0;
    let touchStartY = 0;

    function text(value) {
      if (value === undefined || value === null || value === "") return "-";
      return String(value);
    }
    function numberText(value) {
      if (value === undefined || value === null || value === "") return "-";
      const number = Number(value);
      if (Number.isNaN(number)) return String(value);
      return Number.isInteger(number) ? String(number) : String(number);
    }
    function distance(value) {
      const valueText = numberText(value);
      return valueText === "-" ? "-" : `${valueText}m`;
    }
    function rank(value) {
      const valueText = numberText(value);
      return valueText === "-" ? "-" : `${valueText}位`;
    }
    function rate(value) {
      const valueText = numberText(value);
      return valueText === "-" ? "-" : `${valueText}%`;
    }
    function probability(value) {
      if (value === undefined || value === null || value === "") return "-";
      const number = Number(value);
      if (Number.isNaN(number)) return String(value);
      const percent = number <= 1 ? number * 100 : number;
      const rounded = Math.round(percent * 10) / 10;
      return `${Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1)}%`;
    }
    function probabilityLevel(value) {
      if (value === undefined || value === null || value === "") return "empty";
      const number = Number(value);
      if (Number.isNaN(number)) return "empty";
      const percent = number <= 1 ? number * 100 : number;
      if (percent >= 40) return "elite";
      if (percent >= 35) return "high";
      if (percent >= 30) return "normal";
      return "low";
    }
    function winPlace(win, place) {
      if (!win && !place) return "-";
      return `勝${rate(win)} / 複${rate(place)}`;
    }
    function rateLevel(value) {
      if (value === undefined || value === null || value === "") return "empty";
      const number = Number(value);
      if (Number.isNaN(number)) return "empty";
      if (number >= 35) return "elite";
      if (number >= 30) return "high";
      if (number >= 20) return "normal";
      return "low";
    }
    function rateChip(label, value) {
      return `<span class="rate-chip level-${rateLevel(value)}">${label}${rate(value)}</span>`;
    }
    function bloodlineBox(label, name, win, place) {
      return `<div class="bloodline-box">
        <div class="bloodline-label">${label}</div>
        <div class="bloodline-name">${text(name)}</div>
        <div class="rate-chips">${rateChip("勝", win)}${rateChip("複", place)}</div>
      </div>`;
    }
    function patternBadge(value) {
      const valueText = numberText(value);
      const number = Number(value);
      const level = valueText === "-" ? "pattern-empty" : (number === 15 ? "pattern-hot" : "pattern-normal");
      return `<span class="pattern-badge ${level}">${valueText}</span>`;
    }
    function popularity(row) {
      if (row.popularity) return `${numberText(row.popularity)}番人気`;
      if (row.estimated_popularity) return `推定${numberText(row.estimated_popularity)}番`;
      return "-";
    }
    function wakuText(value) {
      const valueText = numberText(value);
      if (valueText === "-" || valueText === "0") return "枠未定";
      return `${valueText}枠`;
    }
    function wakuDetail(value) {
      const valueText = numberText(value);
      return valueText === "0" ? "未定" : valueText;
    }
    function hasPrediction(row) {
      return Boolean(row.ml_model_rank || row.ml_p_cal);
    }
    function hasPredictionData() {
      return Number(data.predictionRows || 0) > 0;
    }
    function predictionItem(label, value, options = {}) {
      const classes = ["prediction-item"];
      if (options.className) classes.push(options.className);
      if (!hasPrediction(options.row || {})) classes.push("level-empty");
      if (options.level) classes.push(`level-${options.level}`);
      return `<div class="${classes.join(" ")}"><span>${label}</span><strong>${value}</strong></div>`;
    }
    function predictionStrip(row) {
      if (!hasPredictionData()) return "";
      const predicted = hasPrediction(row);
      return `<div class="prediction-strip">
        ${predictionItem("AI順位", rank(row.ml_model_rank), { row, className: `ai-rank ${predicted ? "has-prediction" : ""}` })}
        ${predictionItem("AI複勝", probability(row.ml_p_cal), { row, className: "probability", level: probabilityLevel(row.ml_p_cal) })}
        ${predictionItem("補正sum", numberText(row.ml_sum_time_corrected), { row })}
        ${predictionItem("補正順位", rank(row.ml_sum_time_rank), { row })}
      </div>`;
    }
    function raceList() {
      return data.races.filter((race) => race.stage === stage);
    }
    function currentRaceIndex() {
      const races = raceList();
      const index = races.findIndex((race) => race.race_number === raceNumber);
      return index >= 0 ? index : 0;
    }
    function setState(nextStage, nextRaceNumber) {
      stage = nextStage;
      raceNumber = nextRaceNumber;
      const params = new URLSearchParams({ stage, race: raceNumber });
      history.replaceState(null, "", `${location.pathname}?${params}`);
      render();
    }
    function horseBadge(row) {
      const colors = wakuColors[row.waku] || ["#eef2f7", "#111827", "#cbd5e1"];
      return `<div class="horse-number-badge" style="background:${colors[0]};color:${colors[1]};border-color:${colors[2]};">${text(row.horse_number)}</div>`;
    }
    function detail(label, value) {
      return `<div class="detail-item"><span>${label}</span><strong>${text(value)}</strong></div>`;
    }
    function predictionDetails(row) {
      if (!hasPredictionData()) return [];
      return [
        ["AI順位", rank(row.ml_model_rank)],
        ["AI複勝", probability(row.ml_p_cal)],
        ["AI raw", probability(row.ml_p_raw)],
        ["補正sum", numberText(row.ml_sum_time_corrected)],
        ["補正sum順位", rank(row.ml_sum_time_rank)],
        ["top差", numberText(row.ml_gap_to_top1)],
        ["gap12", numberText(row.ml_gap_12)],
        ["gap23", numberText(row.ml_gap_23)],
        ["gap34", numberText(row.ml_gap_34)]
      ];
    }
    function horseCard(row, index) {
      const rankNo = index + 1;

        ...predictionDetails(row),
        ["diff", numberText(row.diff_time)],
        ["ten1", numberText(row.time_ten_1)],
        ["ten1順位", rank(row.ten1_rank)],
        ["前走ten1", numberText(row.ten1f_time_last)],
        ["ten3", numberText(row.time_ten3)],
        ["ten3順位", rank(row.ten3_rank)],
        ["agari3", numberText(row.time_agari3)],
        ["agari3順位", rank(row.agari3_rank)],
        ["種牡馬", text(row.sire_name)],
        ["種牡馬 勝/複", winPlace(row.sire_win_rate, row.sire_place_rate)],
        ["母父", text(row.bms_name)],
        ["母父 勝/複", winPlace(row.bms_win_rate, row.bms_place_rate)],
        ["単勝", numberText(row.odds_win)],
        ["騎手", text(row.jockey_name)]
      ];
      return `<details class="horse-details ${rankNo === 1 ? "leader" : ""}">
        <summary>
          <div class="card-head">
            <div class="rank-badge">${rankNo}</div>
            ${horseBadge(row)}
            <div class="horse-title">
              <div class="horse-name">${text(row.horse_name)}</div>
              <div class="horse-sub">${wakuText(row.waku)}</div>
            </div>
            <div class="detail-pill">詳細</div>
          </div>
          ${predictionStrip(row)}
          <div class="main-grid">
            <div class="main-item primary"><span>sum_time</span><strong>${numberText(row.sum_time)}</strong></div>
            <div class="main-item"><span>人気</span><strong>${popularity(row)}</strong></div>
            <div class="main-item"><span>同馬場3走内最短</span><strong>${distance(row.min_3_distance)}</strong></div>
            <div class="main-item dash"><span>ダッシュ力</span><strong>${rank(row.ten1_rank)}</strong></div>
            <div class="main-item ten-pattern"><span>ten_pat</span>${patternBadge(row.ten_pat)}</div>

          </div>
          <div class="bloodline-strip">
            ${bloodlineBox("種牡馬", row.sire_name, row.sire_win_rate, row.sire_place_rate)}
            ${bloodlineBox("母父", row.bms_name, row.bms_win_rate, row.bms_place_rate)}
          </div>
        </summary>
        <div class="detail-grid">${detailItems.map(([label, value]) => detail(label, value)).join("")}</div>
      </details>`;
    }
    function sumSortValue(row) {
      const sortSource = row.ml_sum_time_corrected || row.sum_time;
      if (sortSource === undefined || sortSource === null || sortSource === "") return 99999;
      const value = Number(sortSource);
      return Number.isNaN(value) ? 99999 : value;
    }
    function render() {
      if (!data.stages.includes(stage)) stage = data.defaultStage;
      const races = raceList();
      if (!races.some((race) => race.race_number === raceNumber)) raceNumber = races[0].race_number;
      const index = currentRaceIndex();
      const currentRace = races[index];

      document.getElementById("stageTabs").innerHTML = data.stages.map((item) =>
        `<button type="button" class="stage-tab ${item === stage ? "active" : ""}" data-stage="${item}">${item}</button>`
      ).join("");
      document.querySelectorAll(".stage-tab").forEach((button) => {
        button.addEventListener("click", () => setState(button.dataset.stage, "01"));
      });

      document.getElementById("raceTabs").innerHTML = races.map((race) =>
        `<button type="button" class="race-pill ${race.race_number === raceNumber ? "active" : ""}" data-race="${race.race_number}">${Number(race.race_number)}R</button>`
      ).join("");
      document.querySelectorAll(".race-pill").forEach((button) => {
        button.addEventListener("click", () => setState(stage, button.dataset.race));
      });

      document.getElementById("raceTitle").innerHTML =
        `${Number(currentRace.race_number)}R ${text(currentRace.race_name)} <span class="race-subtitle">${text(currentRace.course_type)} ${distance(currentRace.distance)}</span>`;
      document.getElementById("appDate").textContent = `SmartRC ${data.date || ""}`;

      const previous = races[index - 1];
      const next = races[index + 1];
      const previousButton = document.getElementById("prevRace");
      const nextButton = document.getElementById("nextRace");
      previousButton.textContent = previous ? `← ${Number(previous.race_number)}R` : "←";
      nextButton.textContent = next ? `${Number(next.race_number)}R →` : "→";
      previousButton.disabled = !previous;
      nextButton.disabled = !next;
      previousButton.onclick = () => previous && setState(stage, previous.race_number);
      nextButton.onclick = () => next && setState(stage, next.race_number);

      const horses = data.horses
        .filter((row) => row.stage === stage && row.race_number === raceNumber)
        .sort((a, b) => sumSortValue(a) - sumSortValue(b) || Number(a.horse_number) - Number(b.horse_number));
      document.getElementById("horseList").innerHTML = horses.map(horseCard).join("");
    }
    document.addEventListener("touchstart", (event) => {
      if (event.touches.length !== 1) return;
      touchStartX = event.touches[0].clientX;
      touchStartY = event.touches[0].clientY;
    }, { passive: true });
    document.addEventListener("touchend", (event) => {
      if (event.changedTouches.length !== 1) return;
      const dx = event.changedTouches[0].clientX - touchStartX;
      const dy = event.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) < 70 || Math.abs(dx) < Math.abs(dy) * 1.6) return;
      const races = raceList();
      const index = currentRaceIndex();
      const target = dx < 0 ? races[index + 1] : races[index - 1];
      if (target) setState(stage, target.race_number);
    }, { passive: true });
    render();
  </script>
</body>
</html>
