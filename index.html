<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartRC 2026-05-03 Preview</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --line: #d8dee6;
      --text: #111827;
      --muted: #667085;
      --green: #0f7a4c;
      --green-soft: #eaf6ef;
      --blue-soft: #eef4ff;
      --orange-soft: #fff7ed;
      --pink-soft: #fdf2f8;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
    }
    button, select { font: inherit; }
    .shell {
      margin: 0 auto;
      max-width: 920px;
      padding: 10px 12px 28px;
    }
    .stage-tabs {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-bottom: 8px;
    }
    .stage-tab, .race-pill, .nav-button {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #344054;
      min-height: 38px;
      padding: 8px 10px;
    }
    .stage-tab.active, .race-pill.active {
      background: #172033;
      border-color: #172033;
      color: #ffffff;
      font-weight: 700;
    }
    .race-scroll {
      display: flex;
      gap: 6px;
      margin: 0 -12px 10px;
      overflow-x: auto;
      padding: 0 12px 2px;
      scrollbar-width: none;
    }
    .race-scroll::-webkit-scrollbar { display: none; }
    .race-pill {
      flex: 0 0 auto;
      min-width: 48px;
    }
    .app-date {
      color: var(--muted);
      font-size: 12px;
      margin: 2px 0 7px;
    }
    .race-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
      margin: 0 0 10px;
    }
    .race-subtitle {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      margin-left: 4px;
    }
    .nav-row {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 10px;
    }
    .nav-button:disabled {
      color: #b7bec8;
      background: #f7f8fa;
    }
    .horse-details {
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 4px solid #9aa6b2;
      border-radius: 8px;
      margin: 0 0 10px;
      padding: 12px;
    }
    .horse-details.leader {
      background: #f7fbf8;
      border-left-color: var(--green);
    }
    .horse-details summary {
      cursor: pointer;
      list-style: none;
    }
    .horse-details summary::-webkit-details-marker { display: none; }
    .card-head {
      align-items: center;
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .rank-badge {
      align-items: center;
      background: #1f2937;
      border-radius: 999px;
      color: #ffffff;
      display: inline-flex;
      flex: 0 0 30px;
      font-size: 14px;
      font-weight: 700;
      height: 30px;
      justify-content: center;
      line-height: 1;
    }
    .horse-number-badge {
      align-items: center;
      border: 1px solid;
      border-radius: 6px;
      display: inline-flex;
      flex: 0 0 34px;
      font-size: 17px;
      font-weight: 800;
      height: 34px;
      justify-content: center;
      line-height: 1;
    }
    .horse-title { flex: 1 1 auto; min-width: 0; }
    .horse-name {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .horse-sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }
    .detail-pill {
      border: 1px solid #d1d5db;
      border-radius: 999px;
      color: #475467;
      flex: 0 0 auto;
      font-size: 12px;
      line-height: 1;
      padding: 6px 8px;
    }
    .main-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    .main-item {
      background: #f6f7f9;
      border-radius: 8px;
      min-width: 0;
      padding: 8px;
    }
    .main-item.primary { background: var(--green-soft); }
    .main-item.dash { background: var(--blue-soft); }
    .main-item.ten-pattern { background: var(--orange-soft); }
    .main-item.agari-pattern { background: var(--pink-soft); }
    .main-item span, .detail-item span {
      color: var(--muted);
      display: block;
      font-size: 11px;
      line-height: 1.2;
    }
    .main-item strong {
      color: var(--text);
      display: block;
      font-size: 18px;
      line-height: 1.25;
      margin-top: 3px;
      overflow-wrap: anywhere;
    }
    .detail-grid {
      border-top: 1px solid #e5e7eb;
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 10px;
      padding-top: 10px;
    }
    .detail-item strong {
      color: var(--text);
      display: block;
      font-size: 14px;
      line-height: 1.25;
      margin-top: 2px;
      overflow-wrap: anywhere;
    }
    @media (max-width: 640px) {
      .shell { padding: 8px 10px 24px; }
      .race-scroll { margin-left: -10px; margin-right: -10px; padding-left: 10px; padding-right: 10px; }
      .main-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .main-item { padding: 7px; }
      .main-item strong { font-size: 16px; }
      .horse-name { font-size: 16px; }
    }
  </style>
</head>

_name":"高倉稜","time_ten_1":"120","ten1f_time_last":"128","time_ten3":"348","ten3_rank":"3","time_agari3":"366","agari3_rank":"8","ten_pat":"15","agari_pat":"","sire_name":"モーニン","sire_win_rate":"","sire_place_rate":"","bms_name":"キングヘイロー","bms_win_rate":"","bms_place_rate":"","ten1_rank":4},{"race_id":"2026050308030412","stage":"京都","race_number":"12","race_name":"東大路ステークス","course_type":"ダート","distance":"1400","waku":"8","horse_number":"15","horse_name":"テーオールビー","sum_time":"736","diff_time":"31","min_3_distance":"1700","odds_win":"456","popularity":"16","estimated_popularity":"12","popularity_rank":"D","jockey_name":"藤懸貴志","time_ten_1":"121","ten1f_time_last":"128","time_ten3":"366","ten3_rank":"","time_agari3":"370","agari3_rank":"","ten_pat":"30","agari_pat":"","sire_name":"サンダースノー","sire_win_rate":"","sire_place_rate":"","bms_name":"マンハッタンカフェ","bms_win_rate":"","bms_place_rate":"","ten1_rank":7},{"race_id":"2026050308030412","stage":"京都","race_number":"12","race_name":"東大路ステークス","course_type":"ダート","distance":"1400","waku":"8","horse_number":"16","horse_name":"ヤマニンアストロン","sum_time":"719","diff_time":"14","min_3_distance":"1400","odds_win":"74","popularity":"3","estimated_popularity":"2","popularity_rank":"B","jockey_name":"武豊","time_ten_1":"123","ten1f_time_last":"133","time_ten3":"363","ten3_rank":"","time_agari3":"356","agari3_rank":"3","ten_pat":"","agari_pat":"30","sire_name":"ディーマジェスティ","sire_win_rate":"","sire_place_rate":"","bms_name":"フレンチデピュティ","bms_win_rate":"","bms_place_rate":"","ten1_rank":13}]}</script>
  <script>
    const data = JSON.parse(document.getElementById("smartRcData").textContent);
    const wakuColors = {
      "1": ["#ffffff", "#111827", "#d1d5db"],
      "2": ["#111827", "#ffffff", "#111827"],
      "3": ["#dc2626", "#ffffff", "#dc2626"],
      "4": ["#2563eb", "#ffffff", "#2563eb"],
      "5": ["#facc15", "#111827", "#eab308"],
      "6": ["#16a34a", "#ffffff", "#16a34a"],
      "7": ["#f97316", "#111827", "#ea580c"],
      "8": ["#f9a8d4", "#111827", "#f472b6"]
    };
    let stage = new URLSearchParams(location.search).get("stage") || data.defaultStage;
    let raceNumber = new URLSearchParams(location.search).get("race") || "01";
    let touchStartX = 0;
    let touchStartY = 0;

    document.getElementById("appDate").textContent = `SmartRC ${data.date || ""}`;

    function el(tag, options) {
      const node = document.createElement(tag);
      const opts = options || {};
      if (opts.className) node.className = opts.className;
      if (opts.text != null) node.textContent = opts.text;
      if (opts.style) node.setAttribute("style", opts.style);
      if (opts.dataset) {
        for (const [key, value] of Object.entries(opts.dataset)) {
          node.dataset[key] = value;
        }
      }
      if (opts.type) node.setAttribute("type", opts.type);
      if (opts.disabled) node.disabled = true;
      if (opts.children) {
        for (const child of opts.children) {
          if (child != null) node.appendChild(child);
        }
      }
      return node;
    }
    function text(value) {
      if (value === undefined || value === null || value === "") return "-";
      return String(value);
    }
    function numberText(value) {
      if (value === undefined || value === null || value === "") return "-";
      const number = Number(value);
      if (Number.isNaN(number)) return String(value);
      return String(number);
    }
    function distance(value) {
      const valueText = numberText(value);
      return valueText === "-" ? "-" : `${valueText}m`;
    }
    function rank(value) {
      const valueText = numberText(value);
      return valueText === "-" ? "-" : `${valueText}位`;
    }
    function rate(value) {
      const valueText = numberText(value);
      return valueText === "-" ? "-" : `${valueText}%`;
    }
    function winPlace(win, place) {
      if (!win && !place) return "-";
      return `勝${rate(win)} / 複${rate(place)}`;
    }
    function popularity(row) {
      if (row.popularity) return `${numberText(row.popularity)}番人気`;
      if (row.estimated_popularity) return `推定${numberText(row.estimated_popularity)}番`;
      return "-";
    }
    function raceList() {
      return data.races.filter((race) => race.stage === stage);
    }
    function currentRaceIndex() {
      const races = raceList();
      const index = races.findIndex((race) => race.race_number === raceNumber);
      return index >= 0 ? index : 0;
    }
    function setState(nextStage, nextRaceNumber) {
      stage = nextStage;
      raceNumber = nextRaceNumber;
      const params = new URLSearchParams({ stage, race: raceNumber });
      history.replaceState(null, "", `${location.pathname}?${params}`);
      render();
    }
    function horseBadge(row) {
      const colors = wakuColors[row.waku] || ["#eef2f7", "#111827", "#cbd5e1"];
      return el("div", {
        className: "horse-number-badge",
        text: text(row.horse_number),
        style: `background:${colors[0]};color:${colors[1]};border-color:${colors[2]};`,
      });
    }
    function mainItem(label, value, extraClass) {
      const className = extraClass ? `main-item ${extraClass}` : "main-item";
      return el("div", {
        className,
        children: [
          el("span", { text: label }),
          el("strong", { text: value }),
        ],
      });
    }
    function detailItem(label, value) {
      return el("div", {
        className: "detail-item",
        children: [
          el("span", { text: label }),
          el("strong", { text: text(value) }),
        ],
      });
    }
    function horseCard(row, index) {
      const rankNo = index + 1;
      const detailItems = [
        ["枠番", numberText(row.waku)],
        ["diff", numberText(row.diff_time)],
        ["ten1", numberText(row.time_ten_1)],
        ["ten1順位", rank(row.ten1_rank)],
        ["前走ten1", numberText(row.ten1f_time_last)],
        ["ten3", numberText(row.time_ten3)],
        ["ten3順位", rank(row.ten3_rank)],
        ["agari3", numberText(row.time_agari3)],
        ["agari3順位", rank(row.agari3_rank)],
        ["種牡馬", text(row.sire_name)],
        ["種牡馬 勝/複", winPlace(row.sire_win_rate, row.sire_place_rate)],
        ["母父", text(row.bms_name)],
        ["母父 勝/複", winPlace(row.bms_win_rate, row.bms_place_rate)],
        ["単勝", numberText(row.odds_win)],
        ["騎手", text(row.jockey_name)],
      ];

      const cardHead = el("div", {
        className: "card-head",
        children: [
          el("div", { className: "rank-badge", text: String(rankNo) }),
          horseBadge(row),
          el("div", {
            className: "horse-title",
            children: [
              el("div", { className: "horse-name", text: text(row.horse_name) }),
              el("div", { className: "horse-sub", text: `${numberText(row.waku)}枠` }),
            ],
          }),
          el("div", { className: "detail-pill", text: "詳細" }),
        ],
      });

      const mainGrid = el("div", {
        className: "main-grid",
        children: [
          mainItem("sum_time", numberText(row.sum_time), "primary"),
          mainItem("人気", popularity(row)),
          mainItem("同馬場3走内最短", distance(row.min_3_distance)),
          mainItem("ダッシュ力", rank(row.ten1_rank), "dash"),
          mainItem("ten_pat", numberText(row.ten_pat), "ten-pattern"),
          mainItem("agari_pat", numberText(row.agari_pat), "agari-pattern"),
        ],
      });

      const summary = el("summary", { children: [cardHead, mainGrid] });
      const detailGrid = el("div", {
        className: "detail-grid",
        children: detailItems.map(([label, value]) => detailItem(label, value)),
      });

      const details = el("details", {
        className: rankNo === 1 ? "horse-details leader" : "horse-details",
        children: [summary, detailGrid],
      });
      return details;
    }
    function buildRaceTitle(currentRace) {
      const titleNode = el("span", {
        text: `${Number(currentRace.race_number)}R ${text(currentRace.race_name)} `,
      });
      const subtitle = el("span", {
        className: "race-subtitle",
        text: `${text(currentRace.course_type)} ${distance(currentRace.distance)}`,
      });
      return [titleNode, subtitle];
    }
    function render() {
      if (!data.stages.includes(stage)) stage = data.defaultStage;
      const races = raceList();
      if (!races.length) {
        document.getElementById("stageTabs").replaceChildren();
        document.getElementById("raceTabs").replaceChildren();
        document.getElementById("raceTitle").replaceChildren();
        document.getElementById("horseList").replaceChildren(
          el("p", { text: "対象レースがありません。" })
        );
        document.getElementById("prevRace").disabled = true;
        document.getElementById("nextRace").disabled = true;
        return;
      }
      if (!races.some((race) => race.race_number === raceNumber)) raceNumber = races[0].race_number;
      const index = currentRaceIndex();
      const currentRace = races[index];

      const stageNodes = data.stages.map((item) => {
        const button = el("button", {
          type: "button",
          className: item === stage ? "stage-tab active" : "stage-tab",
          text: item,
          dataset: { stage: item },
        });
        button.addEventListener("click", () => setState(item, "01"));
        return button;
      });
      document.getElementById("stageTabs").replaceChildren(...stageNodes);

      const raceNodes = races.map((race) => {
        const button = el("button", {
          type: "button",
          className: race.race_number === raceNumber ? "race-pill active" : "race-pill",
          text: `${Number(race.race_number)}R`,
          dataset: { race: race.race_number },
        });
        button.addEventListener("click", () => setState(stage, race.race_number));
        return button;
      });
      document.getElementById("raceTabs").replaceChildren(...raceNodes);

      document.getElementById("raceTitle").replaceChildren(...buildRaceTitle(currentRace));

      const previous = races[index - 1];
      const next = races[index + 1];
      const previousButton = document.getElementById("prevRace");
      const nextButton = document.getElementById("nextRace");
      previousButton.textContent = previous ? `← ${Number(previous.race_number)}R` : "←";
      nextButton.textContent = next ? `${Number(next.race_number)}R →` : "→";
      previousButton.disabled = !previous;
      nextButton.disabled = !next;
      previousButton.onclick = () => previous && setState(stage, previous.race_number);
      nextButton.onclick = () => next && setState(stage, next.race_number);

      const horsesAll = data.horses.filter(
        (row) => row.stage === stage && row.race_number === raceNumber
      );
      const withSum = horsesAll.filter((row) => row.sum_time);
      const withoutSum = horsesAll.filter((row) => !row.sum_time);
      const sortedHorses = [
        ...withSum.sort(
          (a, b) =>
            Number(a.sum_time) - Number(b.sum_time) ||
            Number(a.horse_number) - Number(b.horse_number)
        ),
        ...withoutSum.sort((a, b) => Number(a.horse_number) - Number(b.horse_number)),
      ];
      const cards = sortedHorses.map((row, idx) => horseCard(row, idx));
      const list = document.getElementById("horseList");
      if (cards.length === 0) {
        list.replaceChildren(el("p", { text: "出走馬データがありません。" }));
      } else {
        list.replaceChildren(...cards);
      }
    }
    document.addEventListener("touchstart", (event) => {
      if (event.touches.length !== 1) return;
      touchStartX = event.touches[0].clientX;
      touchStartY = event.touches[0].clientY;
    }, { passive: true });
    document.addEventListener("touchend", (event) => {
      if (event.changedTouches.length !== 1) return;
      const dx = event.changedTouches[0].clientX - touchStartX;
      const dy = event.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) < 70 || Math.abs(dx) < Math.abs(dy) * 1.6) return;
      const races = raceList();
      const index = currentRaceIndex();
      const target = dx < 0 ? races[index + 1] : races[index - 1];
      if (target) setState(stage, target.race_number);
    }, { passive: true });
    render();
  </script>
</body>
</html>
